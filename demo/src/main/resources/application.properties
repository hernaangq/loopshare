spring.application.name=loopshare

# ─── H2 In-Memory Database ───
spring.datasource.url=jdbc:h2:mem:loopshare
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JPA / Hibernate ───
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# ─── Load data.sql after schema creation ───
spring.sql.init.mode=always

# ─── Swagger ───
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ─── Server ───
server.port=8000

# ─── Deal Scout AI Agent ───
# provider: mock | openai
dealscout.llm.provider=mock
dealscout.llm.base-url=https://api.openai.com
dealscout.llm.model=gpt-4o-mini
dealscout.llm.api-key=
