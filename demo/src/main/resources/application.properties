spring.application.name=loopshare

# ─── H2 In-Memory Database ───
spring.datasource.url=jdbc:h2:mem:loopshare
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JPA / Hibernate ───
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# ─── Load data.sql after schema creation ───
spring.sql.init.mode=always

# ─── Swagger ───
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ─── Server ───
server.port=8005

# ─── Real Building Sync (City of Chicago) ───
buildings.sync.enabled=true
buildings.sync.base-url=https://data.cityofchicago.org/resource/xq83-jr8c.json
buildings.sync.data-year=2023
buildings.sync.limit=1000

# ─── Listing Auto-Generation from Imported Buildings ───
listings.autogenerate.enabled=true
listings.autogenerate.max-buildings=2000

# ─── Deal Scout AI Agent ───
# provider: mock | ollama | openai
dealscout.llm.provider=ollama
dealscout.llm.base-url=http://localhost:11434
dealscout.llm.model=gpt-4o-mini
dealscout.llm.ollama-model=llama3
dealscout.llm.api-key=

# ─── Deal Scout Reliability Gates ───
dealscout.enrichment.enabled=true
dealscout.enrichment.min-confidence=0.8
dealscout.enrichment.require-verified-email=true
dealscout.outreach.allow-unverified-drafts=true
